<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#0a0a0a"/>
  <rect width="1600" height="900" fill="url(#grid2)"/>

  <!-- title -->
  <g font-family="monospace" fill="#7a7a7a">
    <text x="80" y="80" font-size="20" fill="#c8c8c8">// fig.1 — crt internals (cross-section)</text>
    <text x="80" y="105" font-size="13">do not touch anything that hums.</text>
  </g>

  <!-- CRT cross-section: the bulky tube extends back, screen on left -->
  <!-- screen face -->
  <g stroke="#c8c8c8" stroke-width="2.5">
    <path d="M 250 280 Q 240 450 250 620 L 320 605 Q 315 450 320 295 Z" fill="#0a0a0a"/>
    <!-- phosphor coating line -->
    <path d="M 320 295 Q 315 450 320 605" stroke="#00efa6" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  </g>

  <!-- main tube body widening to neck -->
  <g stroke="#c8c8c8" stroke-width="2.5">
    <path d="M 320 295 L 950 380 L 950 520 L 320 605"/>
    <line x1="320" y1="295" x2="320" y2="605"/>
  </g>

  <!-- electron gun neck -->
  <g stroke="#c8c8c8" stroke-width="2.5">
    <path d="M 950 380 L 1240 415 L 1240 485 L 950 520 Z" fill="#0a0a0a"/>
    <!-- cathode / heater coil -->
    <circle cx="1180" cy="450" r="22" fill="#0a0a0a" stroke="#00efa6"/>
    <path d="M 1165 442 q 5 -5 10 0 q 5 5 10 0 q 5 -5 10 0" stroke="#00efa6" stroke-width="1.5"/>
    <line x1="1240" y1="450" x2="1290" y2="450" stroke="#7a7a7a"/>
  </g>

  <!-- electron beam (dashed line through tube) -->
  <line x1="1170" y1="450" x2="320" y2="450" stroke="#00efa6" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.7"/>

  <!-- deflection yoke (coils around neck) -->
  <g stroke="#5eafff" stroke-width="2">
    <ellipse cx="990" cy="450" rx="14" ry="40"/>
    <ellipse cx="1015" cy="450" rx="14" ry="40"/>
    <ellipse cx="1040" cy="450" rx="14" ry="40"/>
  </g>

  <!-- flyback transformer (above neck) -->
  <g stroke="#c8c8c8" stroke-width="2">
    <rect x="700" y="200" width="170" height="120" fill="#0a0a0a"/>
    <!-- coil windings -->
    <line x1="710" y1="220" x2="860" y2="220" stroke-width="1.5"/>
    <line x1="710" y1="235" x2="860" y2="235" stroke-width="1.5"/>
    <line x1="710" y1="250" x2="860" y2="250" stroke-width="1.5"/>
    <line x1="710" y1="265" x2="860" y2="265" stroke-width="1.5"/>
    <line x1="710" y1="280" x2="860" y2="280" stroke-width="1.5"/>
    <line x1="710" y1="295" x2="860" y2="295" stroke-width="1.5"/>
    <!-- HV output to anode cap -->
    <path d="M 785 320 L 785 360 L 480 400" stroke="#00efa6" stroke-width="2"/>
  </g>

  <!-- anode cap (high-voltage suction cup) on tube -->
  <g stroke="#00efa6" stroke-width="2">
    <ellipse cx="480" cy="400" rx="22" ry="10" fill="#0a0a0a"/>
    <line x1="468" y1="400" x2="468" y2="395" stroke="#c8c8c8"/>
    <line x1="492" y1="400" x2="492" y2="395" stroke="#c8c8c8"/>
  </g>

  <!-- the capacitor — highlighted -->
  <g>
    <rect x="490" y="640" width="140" height="160" fill="#0a0a0a" stroke="#00efa6" stroke-width="2.5"/>
    <!-- vertical cap plates -->
    <line x1="560" y1="660" x2="560" y2="720" stroke="#00efa6" stroke-width="3"/>
    <line x1="540" y1="725" x2="580" y2="725" stroke="#00efa6" stroke-width="3"/>
    <line x1="560" y1="730" x2="560" y2="790" stroke="#00efa6" stroke-width="3"/>
    <!-- warning markings -->
    <text x="500" y="680" font-family="monospace" font-size="11" fill="#00efa6">! 25kv</text>
    <text x="500" y="780" font-family="monospace" font-size="11" fill="#00efa6">holds charge</text>
  </g>

  <!-- callout lines + labels -->
  <g font-family="monospace" font-size="13" fill="#c8c8c8">
    <!-- screen / phosphor -->
    <line x1="285" y1="280" x2="285" y2="180" stroke="#7a7a7a" stroke-width="1"/>
    <line x1="285" y1="180" x2="170" y2="180" stroke="#7a7a7a" stroke-width="1"/>
    <text x="60" y="175">phosphor screen</text>

    <!-- flyback -->
    <line x1="785" y1="200" x2="785" y2="160" stroke="#7a7a7a" stroke-width="1"/>
    <line x1="785" y1="160" x2="1050" y2="160" stroke="#7a7a7a" stroke-width="1"/>
    <text x="1060" y="165">flyback transformer</text>

    <!-- yoke -->
    <line x1="1015" y1="495" x2="1015" y2="620" stroke="#7a7a7a" stroke-width="1"/>
    <line x1="1015" y1="620" x2="1280" y2="620" stroke="#7a7a7a" stroke-width="1"/>
    <text x="1290" y="625">deflection yoke</text>

    <!-- electron gun -->
    <line x1="1180" y1="425" x2="1180" y2="350" stroke="#7a7a7a" stroke-width="1"/>
    <line x1="1180" y1="350" x2="1310" y2="350" stroke="#7a7a7a" stroke-width="1"/>
    <text x="1320" y="355">electron gun</text>

    <!-- capacitor -->
    <line x1="560" y1="640" x2="560" y2="600" stroke="#00efa6" stroke-width="1"/>
    <line x1="560" y1="600" x2="700" y2="600" stroke="#00efa6" stroke-width="1"/>
    <text x="710" y="605" fill="#00efa6">main capacitor → the dangerous one</text>
  </g>

  <!-- corner crosshair marks -->
  <g stroke="#2a2a2a" stroke-width="1">
    <path d="M 60 60 L 100 60 M 60 60 L 60 100"/>
    <path d="M 1540 60 L 1500 60 M 1540 60 L 1540 100"/>
    <path d="M 60 840 L 100 840 M 60 840 L 60 800"/>
    <path d="M 1540 840 L 1500 840 M 1540 840 L 1540 800"/>
  </g>
</svg>
